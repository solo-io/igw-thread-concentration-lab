# JWT validation for the realistic-filters scenario.
#
# Many production IGW deployments run JWT validation (RequestAuthentication)
# on all routes in PERMISSIVE mode. Cache hit rate is high when traffic
# comes from a small set of workloads reusing the same token, so the JWKS
# fetch and signature-verification cost are not the bottleneck; what we
# are measuring here is the per-request filter overhead at scale.
#
# We model this with Istio's published test JWKS and a pre-signed demo JWT.
# Both come from https://github.com/istio/istio/tree/release-1.27/security/tools/jwt/samples
# and are stable, internet-fetchable URLs that Envoy caches at startup.
#
# AuthorizationPolicy is intentionally absent: with RequestAuthentication
# only, missing/invalid tokens are NOT rejected; the validation filter
# simply runs and records claims if present. That matches the common
# "permissive" rollout pattern.
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: jwt-on-ingress
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  jwtRules:
  - issuer: testing@secure.istio.io
    jwksUri: https://raw.githubusercontent.com/istio/istio/release-1.27/security/tools/jwt/samples/jwks.json
    forwardOriginalToken: true

# Gateway and VirtualService route external HTTP traffic from the
# istio-ingressgateway pod to the httpbin backend.
#
# Plaintext (HTTP) listener on port 80 is intentional: TLS handshake cost
# adds variance to p99 measurement and is unrelated to the HTTP/2 worker-
# thread mechanism under test (per Phase 2 refinement A4 in PLAN.md).
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: igw-test-gateway
  namespace: igw-test
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: httpbin
  namespace: igw-test
spec:
  hosts:
  - "*"
  gateways:
  - igw-test-gateway
  http:
  - route:
    - destination:
        host: httpbin.igw-test.svc.cluster.local
        port:
          number: 8080

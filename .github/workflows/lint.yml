name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new push to the same branch lands.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned per supply-chain hygiene: the @v4 tag is mutable and could
      # be moved to malicious code by an attacker (cf. tj-actions/changed-files
      # incident, March 2025). Update by replacing the SHA + bumping the
      # comment; check `gh api /repos/actions/checkout/git/refs/tags/v4`.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ----------------------------------------------------------------
      # Bash: parse-only check on every shell script in the repo. Catches
      # syntax errors that would only otherwise fail at deploy time.
      # ----------------------------------------------------------------
      - name: bash -n on shell scripts
        run: |
          for f in deploy.sh run-tests.sh cleanup.sh tools/cpu_sampler.sh tools/metric_sampler.sh tools/lib.sh; do
            echo "  bash -n ${f}"
            bash -n "${f}"
          done

      # ----------------------------------------------------------------
      # shellcheck: catches a wider class of bash bugs (unquoted vars,
      # unintended globbing, broken pipelines under set -e). Treat
      # warnings as failures; if a finding is intentional, suppress it
      # inline with `# shellcheck disable=SCNNNN` and a brief comment.
      # ----------------------------------------------------------------
      # SHA-pinned (see Checkout note above). The @master ref is mutable;
      # this SHA is the 2.0.0 release. Update by checking
      # `gh api /repos/ludeeus/action-shellcheck/releases/latest`.
      - name: shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          scandir: ./
          additional_files: deploy.sh run-tests.sh cleanup.sh tools/cpu_sampler.sh tools/metric_sampler.sh tools/lib.sh

      # ----------------------------------------------------------------
      # Dashboard: ensure the JSON is parseable. Anything beyond well-
      # formedness needs a live Grafana to verify, but JSON validity
      # alone catches the most common failure mode (a stray comma after
      # a hand edit).
      # ----------------------------------------------------------------
      - name: Validate dashboard JSON
        run: |
          python3 -c "import json; json.load(open('dashboard/igw-thread-concentration.json'))"
          echo "  dashboard/igw-thread-concentration.json: valid JSON"

      # ----------------------------------------------------------------
      # Python: compile-check the plot script. Doesn't run it; just
      # confirms it parses under the runner's Python.
      # ----------------------------------------------------------------
      - name: py_compile plot_results.py
        run: |
          python3 -m py_compile tools/plot_results.py
          echo "  tools/plot_results.py: compiles"

      # ----------------------------------------------------------------
      # YAML manifests: schema-validate against published Kubernetes
      # OpenAPI specs. kubeconform is more lenient than kubectl
      # --dry-run because it doesn't need a live cluster, and ships with
      # CRD support so it doesn't choke on EnvoyFilter / Gateway / etc.
      # We point at the upstream Istio + Gateway-API schema bundles for
      # the CRDs and skip kinds we know aren't covered.
      #
      # Pinned to a tagged release (not `releases/latest`) so a future
      # upstream rebuild can't silently change CI behavior. Update by
      # checking `gh api /repos/yannh/kubeconform/releases/latest --jq
      # .tag_name` and bumping the tag below.
      # ----------------------------------------------------------------
      - name: kubeconform manifests
        env:
          KUBECONFORM_VERSION: v0.7.0
        run: |
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          ./kubeconform -strict -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            manifests/

      # ----------------------------------------------------------------
      # Go: compile h2dial. Without this, a syntax or import error in
      # h2dial/main.go only surfaces during `docker build` in deploy.sh.
      # Uses the committed go.mod + go.sum so CI's dependency tree is
      # content-hash-identical to local and Dockerfile builds.
      #
      # Go version matches the h2dial Dockerfile (golang:1.25-alpine) so
      # CI catches anything that needs 1.25-specific behavior before the
      # docker build does, and so the runner doesn't drift away from
      # whatever local builds use.
      # ----------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.0.2
        with:
          go-version: '1.25'
          cache-dependency-path: h2dial/go.sum
      - name: Compile h2dial
        working-directory: h2dial
        run: |
          go mod download
          go vet ./...
          go build ./...

      # ----------------------------------------------------------------
      # hadolint: lint the two Dockerfiles. ghz-image/Dockerfile
      # suppresses:
      #   DL3029: --platform=linux/amd64 is the whole point of the file
      #           (arm64 Rosetta path for an amd64-only binary).
      #   DL3018: pinning every transitive apk package (curl and ca-cert)
      #           to a specific version is more bookkeeping than the
      #           digest-pinned alpine base already gives us. The base
      #           image hash effectively freezes the repo index.
      #   DL4006: the only pipe in RUN is `echo "<hash>" | sha256sum -c`,
      #           where echo cannot fail. The downstream `&&` chain
      #           handles every other error path.
      # ----------------------------------------------------------------
      - name: hadolint h2dial/Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: h2dial/Dockerfile
      - name: hadolint ghz-image/Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ghz-image/Dockerfile
          ignore: DL3029,DL3018,DL4006

      # ----------------------------------------------------------------
      # yamllint: structural / style sanity on every YAML the lab ships.
      # Uses the `relaxed` ruleset (line-length off, document-start off,
      # truthy off) because the manifests are hand-edited and don't
      # benefit from rigid formatting rules. Catches the things that
      # genuinely break: duplicate keys, indentation that flips meaning,
      # trailing tabs that some editors paste in.
      # ----------------------------------------------------------------
      - name: yamllint manifests
        run: |
          pip install --quiet yamllint==1.35.1
          yamllint -d relaxed manifests/
          echo "  yamllint: manifests/ clean"
